// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  ext {
    buildToolsVersion = "35.0.0"
    minSdkVersion = 26
    compileSdkVersion = 35
    targetSdkVersion = 35
    ndkVersion = "26.3.11579264"
  }
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

subprojects {
    def applyCppFix = { p ->
        if (p.hasProperty("android")) {
            try {
                def cmake = p.android.defaultConfig.externalNativeBuild.cmake
                if (cmake != null) {
                    cmake.cppFlags += " -include ${rootProject.projectDir}/app/src/main/jni/std_format_fix.h"
                }
            } catch (Exception e) {
                // Some projects might not have the expected structure, skip them
            }
        }
    }

    if (it.state.executed) {
        applyCppFix(it)
    } else {
        it.afterEvaluate { applyCppFix(it) }
    }
}
