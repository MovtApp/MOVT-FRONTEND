rules:
  - id: expo-public-secret-exposure
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      Variável EXPO_PUBLIC_* com nome sensível (KEY/SECRET/TOKEN/PASSWORD/PRIVATE).
      Variáveis com prefixo EXPO_PUBLIC_ são INLINADAS no bundle do cliente e ficam
      extraíveis do APK/IPA. Não use EXPO_PUBLIC_ para segredos: proxie a chamada por
      um backend/Edge Function que guarde o segredo no servidor.
    patterns:
      - pattern: process.env.$VAR
      - metavariable-regex:
          metavariable: $VAR
          regex: ^EXPO_PUBLIC_.*(KEY|SECRET|TOKEN|PASSWORD|PRIVATE)
