rules:
  - id: no-hardcoded-secrets
    languages: [generic]
    severity: ERROR
    message: >
      Possível segredo hardcoded detectado (token de auth do Sentry, Google API key,
      JWT ou bloco de chave privada). Segredos não devem ser commitados: mova para um
      secret manager / variável de ambiente injetada no build e ROTACIONE a credencial
      exposta (assuma-a como comprometida, pois fica no histórico do git).
    options:
      # Casa o regex em qualquer parte do arquivo, sem depender da estrutura da linguagem.
      generic_ellipsis_max_span: 0
    patterns:
      - pattern-either:
          # Sentry user auth token (prefixo sntryu_)
          - pattern-regex: \bsntryu_[A-Za-z0-9]{32,}\b
          # Google API key (Maps, etc.) – AIza + 35 chars
          - pattern-regex: \bAIza[0-9A-Za-z_\-]{35}\b
          # JWT (3 segmentos base64url) – ex.: anon/service key do Supabase
          - pattern-regex: \beyJ[A-Za-z0-9_\-]{8,}\.eyJ[A-Za-z0-9_\-]{8,}\.[A-Za-z0-9_\-]{8,}
          # Bloco PEM de chave privada
          - pattern-regex: -----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----
    paths:
      exclude:
        - node_modules
        - "*.lock"
        - "package-lock.json"
        - "yarn.lock"
